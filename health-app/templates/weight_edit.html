{% extends "base.html" %}
{% set active = 'weight' %}
{% block heading %}修改体重{% endblock %}
{% block content %}
<div class="card">
  <h2>修改这条记录</h2>
  <form method="post" action="{{ url_for('weight_edit', log_id=log.id) }}">
    <label>体重 (kg)</label>
    <input type="number" step="0.1" name="weight_kg" value="{{ log.weight_kg }}" inputmode="decimal" required>
    <label>时间</label>
    <input type="datetime-local" name="recorded_at" value="{{ log.recorded_at.strftime('%Y-%m-%dT%H:%M') }}">
    <label>备注</label>
    <input name="note" value="{{ log.note or '' }}">
    <button class="btn" type="submit">保存修改</button>
  </form>
  <a class="btn" href="{{ url_for('weight') }}" style="background:#eef0ec;color:var(--ink)">返回</a>
</div>
{% endblock %}
